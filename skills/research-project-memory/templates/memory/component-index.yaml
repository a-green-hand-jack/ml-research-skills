# Component index for cross-project memory.

project_name: {{PROJECT_NAME}}
last_updated: {{DATE}}

github_project:
  enabled: false
  owner: ""
  title: ""
  number: ""
  url: ""
  linked_repositories: []

components:
  - name: paper
    path: paper
    memory_path: paper/.agent
    worktree_index_path: paper/.agent/worktree-index.md
    worktree_root: paper-worktrees
    owns:
      - paper sections
      - claims in prose
      - figures and tables
      - venue writing decisions
      - venue/arXiv/camera-ready paper worktrees
  - name: code
    path: code
    memory_path: code/.agent
    worktree_index_path: code/.agent/worktree-index.md
    worktree_root: code-worktrees
    evidence_paths:
      results: code/docs/results
      reports: code/docs/reports
      runs: code/docs/runs
    owns:
      - implementation state
      - experiment entry points
      - code-side result reports
      - run pointers
      - remote execution state
      - code worktrees
  - name: slides
    path: slides
    memory_path: slides/.agent
    owns:
      - presentation story
      - audience feedback
      - slide-specific stale evidence
  - name: reviewer
    path: reviewer
    memory_path: reviewer/.agent
    owns:
      - simulated reviews
      - pre-submission risk register
  - name: rebuttal
    path: rebuttal
    memory_path: rebuttal/.agent
    owns:
      - real review issues
      - response plan
      - promised revisions
  - name: artifact
    path: artifact
    memory_path: artifact/.agent
    owns:
      - artifact evaluation package state
      - reproduction instructions
      - release handoff

worktrees:
  code_root: code-worktrees
  paper_root: paper-worktrees
  # Entry fields: id, component, branch, path, status, leaf_memory,
  # component_index, linked_ids, exit_condition.
  entries: []
