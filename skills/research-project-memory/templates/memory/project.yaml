# Stable project memory. Commit this file when shared project identity or policy changes.

project:
  name: {{PROJECT_NAME}}
  root: {{PROJECT_ROOT}}
  research_question: ""
  positioning: ""
  target_venue: ""
  target_milestone: ""
  status: active

memory_policy:
  commit_shared_memory: true
  keep_private_paths_out_of_shared_memory: true
  require_certainty_labels: true
  reverify_volatile_state_before_action: true
  track_paper_source_visibility: true
  track_toolchain_gates: true

toolchain_gates:
  policy: check-before-mutate
  code:
    environment_check: "uv sync"
    format_check: "uv run ruff format --check src tests experiments scripts"
    lint_check: "uv run ruff check src tests experiments scripts"
    type_check: "uv run mypy src"
    test_check: "uv run pytest tests -v"
    mutate_only_when_requested:
      - "uv run ruff format src tests experiments scripts"
      - "uv run ruff check --fix src tests experiments scripts"
  paper:
    source_format_check: "tex-fmt --check --nowrap --recursive ."
    submission_check: "bash <submit-paper-skill-dir>/scripts/check.sh \"$PAPER_DIR\""
    compile_truth: "Overleaf/GitHub or local LaTeX compile log"
    mutate_only_when_requested:
      - "tex-fmt --nowrap --recursive ."
  coordination:
    git_status_check: "git status --short --branch"
    whitespace_check: "git diff --check"
    github_auth_check: "gh auth status"
    github_pr_check: "gh pr checks"
  notes: "Preserve component-specific existing toolchains when they differ; record overrides in component guidance or worktree status."

github_project:
  enabled: false
  owner: ""
  title: ""
  number: ""
  url: ""
  visibility: private
  sync_policy: none # none | manual | issue-pr-links | action-board
  scope_required: project
  notes: "Optional cloud coordination board. Do not use as the only copy of research memory."

components:
  paper:
    path: paper
    memory_path: paper/.agent
    worktree_index_path: paper/.agent/worktree-index.md
    worktree_root: paper-worktrees
    default_visibility_tier: author-visible
    overleaf_linked: unknown
    private_agent_state_policy: keep-out-of-visible-source
    status: planned
  code:
    path: code
    memory_path: code/.agent
    worktree_index_path: code/.agent/worktree-index.md
    worktree_root: code-worktrees
    evidence_paths:
      results: code/docs/results
      reports: code/docs/reports
      runs: code/docs/runs
    status: planned
  slides:
    path: slides
    memory_path: slides/.agent
    status: optional
  reviewer:
    path: reviewer
    memory_path: reviewer/.agent
    status: optional
  rebuttal:
    path: rebuttal
    memory_path: rebuttal/.agent
    status: optional
  artifact:
    path: artifact
    memory_path: artifact/.agent
    status: optional

id_counters:
  claim: 0
  evidence: 0
  experiment: 0
  figure: 0
  risk: 0
  action: 0
  decision: 0
  worktree: 0
  review: 0
  visibility: 0
