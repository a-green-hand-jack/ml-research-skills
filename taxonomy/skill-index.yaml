description: >
  Canonical taxonomy of all ml-research-skills skills.
  Used by scripts/validate_skill_taxonomy.py for consistency checking.
  role: router | leaf
  domain: experiment | writing | discovery | ops | cross-cutting | routing
  lifecycle_phase: idea | planning | data | execution | monitoring | debugging | analysis |
                   drafting | editing | review | submission | release | memory | reporting |
                   delegation | audit | communication | routing
  primary_router: the domain router that routes to this skill (leaf skills only).
  direct_from_root: true if ml-research-router routes here without going through a domain router.

routers:
